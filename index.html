<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <link rel="icon" href="https://img.icons8.com/color/48/light.png">
  <title>Random Quote Generator</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Da+2:wght@400..800&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gradient-to-br from-[#202e46] via-[#1b2336] to-[#1e3a5c] min-h-screen flex items-center justify-center">

  <div class="bg-white/10 p-8 rounded-xl shadow-xl flex flex-col items-center max-w-md w-full">
    <h1 class="text-3xl font-extrabold text-[#00c3ff] mb-6 text-center tracking-tight drop-shadow">Islamic Quote Generator

</h1>
    
    <blockquote class="mb-4 w-full">
      <p id="TEXT" class="text-xl  text-white font-semibold  text-center transition-all duration-300 min-h-[60px]" style="font-family: 'Hind Siliguri', 'Baloo Da 2', sans-serif;">
        Quote will appear here...
      </p>
      <footer>
        <p id="Author" class="text-right text-gray-400 mt-2 text-base font-medium" style="font-family: 'Hind Siliguri', 'Baloo Da 2', sans-serif;"></p>
      </footer>
    </blockquote>

    <div class="flex items-center gap-3 mt-2 mb-2">
      <button
        id="emojiBtn"
        class="text-2xl px-3 py-1 rounded-full bg-white/30 shadow hover:scale-125 hover:bg-white/50 active:scale-90 transition-all duration-200"
        title="React with Emoji"
      >😊</button>
    
    </div>

    <button
      id="button"
      class="mt-2 px-6 py-2 bg-gradient-to-r from-[#00c3ff] to-[#005fa3] text-white rounded-full font-semibold shadow hover:from-[#009fd6] hover:to-[#004a80] active:scale-95 transition-all duration-300"
    >
      Generate Quote
    </button>
  </div>

  <script src="app.js"></script>
</body>
</html>
